name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build /home/runner/work/shed/backend/data-api/Dockerfile --file Dockerfile --tag lucid-shed-api:$(date +%s)
