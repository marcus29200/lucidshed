name: Data API Tests

on:
  push:
    paths:
      - 'backend/data-api/**'
    branches:
      - main
  pull_request:
    paths:
      - 'backend/data-api/**'
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: users
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d users"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      opensearch:
        image: opensearchproject/opensearch:2.17.1
        options: --health-cmd="curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'" --health-retries=10 --health-interval=5s
        env:
          discovery.type: "single-node"
          OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
          plugins.security.disabled: "true"
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Luc1dshedTester!"
        ports:
          - 9200:9200

    steps:
    - name: Check out the code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'  # Specify the Python version you need

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install
      working-directory: backend/data-api

    - name: Run tests
      run: |
        poetry run pytest -n auto
      working-directory: backend/data-api
