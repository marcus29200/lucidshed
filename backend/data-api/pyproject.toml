[tool.poetry]
name = "app"
version = "0.1.0"
description = ""
authors = ["Marcus Scaffidi", "Zach Durham"]

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.111.0"
pydantic = "^2.8.2"
aiohttp = "^3.10.1"
asyncio = "^3.4.3"
asyncpg = "^0.29.0"
uvicorn = "^0.30.1"
bcrypt = "^4.2.0"
passlib = "^1.7.4"
pyjwt = "^2.9.0"
sendgrid = "^6.11.0"
backoff = "^2.2.1"
pytest-cov = "^5.0.0"

[tool.poetry.group.dev.dependencies]
black = "^24.8.0"
pytest = "^8.2.2"
mypy = "^1.11.1"
isort = "^5.13.2"
flake8 = "^7.1.1"
pytest-asyncio = "^0.23.8"
pytest-xdist = "^3.6.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
api = "app.entrypoints:run_api"
vacuum = "app.commands.organizations.vacuum:run_command"
test_cleanup = "app.commands.organizations.cleanup_test_data:run_command"

[tool.black]
line-length = 120